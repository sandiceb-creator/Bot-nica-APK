name: APK Botanica
on:
  workflow_dispatch:
env:
  ANDROID_HOME: /usr/local/lib/android/sdk
  ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
jobs:
  b:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 18
      - name: Build APK
        run: |
          java -version
          ls $ANDROID_HOME/build-tools/
          npm i -g @bubblewrap/cli
          keytool -genkey -v -keystore k.jks -alias a -keyalg RSA -keysize 2048 -validity 9999 -storepass p123 -keypass p123 -dname "CN=B,O=B,C=ES"
          printf '{"packageId":"com.botanica.guianatural","host":"teal-queijadas-c4b52f.netlify.app","startUrl":"/b2.html","name":"Botanica","launcherName":"Botanica","display":"standalone","themeColor":"#2d6a4f","themeColorDark":"#2d6a4f","backgroundColor":"#fff","enableNotifications":false,"shortcuts":[],"iconUrl":"https://teal-queijadas-c4b52f.netlify.app/icon-512.png","maskableIconUrl":"https://teal-queijadas-c4b52f.netlify.app/icon-512.png","monochromeIconUrl":"https://teal-queijadas-c4b52f.netlify.app/icon-512.png","splashScreenFadeOutDuration":300,"generatorApp":"bubblewrap-cli","webManifestUrl":"https://teal-queijadas-c4b52f.netlify.app/manifest.json","fallbackType":"customtabs","features":{},"signingKey":{"path":"../k.jks","alias":"a"},"appVersionName":"1.0","appVersionCode":1,"orientation":"default"}' > twa-manifest.json
          BUBBLEWRAP_KEYSTORE_PASSWORD=p123 BUBBLEWRAP_KEY_PASSWORD=p123 bubblewrap build --skipPwaValidation
        continue-on-error: true
      - run: find . -name "*.apk" -o -name "*.aab" || echo "No encontrado"
      - uses: actions/upload-artifact@v4
        with:
          name: botanica-apk
          path: "**/*.apk"
          if-no-files-found: warn
