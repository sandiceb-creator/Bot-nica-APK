name: Crear APK de Android
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Generar APK via PWABuilder
        run: |
          curl -s -X POST "https://pwabuilder-cloudapk.azurewebsites.net/generateAppPackage" \
            -H "Content-Type: application/json" \
            -d '{
              "packageId": "com.botanica.guianatural",
              "host": "teal-queijadas-c4b52f.netlify.app",
              "startUrl": "/b2.html",
              "name": "Botanica - Guia Natural",
              "launcherName": "Botanica",
              "themeColor": "#2d6a4f",
              "backgroundColor": "#ffffff",
              "enableNotifications": false,
              "iconUrl": "https://teal-queijadas-c4b52f.netlify.app/icon-512.png",
              "webManifestUrl": "https://teal-queijadas-c4b52f.netlify.app/manifest.json",
              "fallbackType": "customtabs",
              "signingMode": "none",
              "appVersion": "1.0.0",
              "appVersionCode": 1,
              "display": "standalone",
              "orientation": "default"
            }' \
            --output botanica-android.zip \
            --max-time 300
          ls -la botanica-android.zip || echo "No se genero el zip"

      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: botanica-android
          path: botanica-a
